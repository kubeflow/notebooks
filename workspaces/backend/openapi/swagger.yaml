          In addition, if HostProcess is true then HostNetwork must also be set to true.
          +optional
        type: boolean
      runAsUserName:
        description: |-
          The UserName in Windows to run the entrypoint of the container process.
          Defaults to the user specified in image metadata if unspecified.
          May also be set in PodSecurityContext. If set in both SecurityContext and
          PodSecurityContext, the value specified in SecurityContext takes precedence.
          +optional
        type: string
    type: object
  v1beta1.ActivityProbe:
    properties:
      exec:
        allOf:
        - $ref: '#/definitions/v1beta1.ActivityProbeExec'
        description: |-
          a shell command probe
           - if the Workspace had activity in the last 60 seconds this command
             should return status 0, otherwise it should return status 1
          +kubebuilder:validation:Optional
      jupyter:
        allOf:
        - $ref: '#/definitions/v1beta1.ActivityProbeJupyter'
        description: |-
          a Jupyter-specific probe
           - will poll the `/api/status` endpoint of the Jupyter API, and use the `last_activity` field
           - note, users need to be careful that their other probes don't trigger a "last_activity" update
             e.g. they should only check the health of Jupyter using the `/api/status` endpoint
          +kubebuilder:validation:Optional
    type: object
  v1beta1.ActivityProbeExec:
    properties:
      command:
        description: |-
          the command to run
          +kubebuilder:validation:MinItems:=1
          +kubebuilder:example={"bash", "-c", "exit 0"}
        items:
          type: string
        type: array
    type: object
  v1beta1.ActivityProbeJupyter:
    properties:
      lastActivity:
        description: |-
          if the Jupyter-specific probe is enabled
          +kubebuilder:example=true
        type: boolean
    type: object
  v1beta1.HTTPProxy:
    properties:
      removePathPrefix:
        description: |-
          if the path prefix is stripped from incoming HTTP requests
           - if true, the '/workspace/connect/{profile_name}/{workspace_name}/' path prefix
             is stripped from incoming requests, the application sees the request
             as if it was made to '/...'
           - this only works if the application serves RELATIVE URLs for its assets
          +kubebuilder:validation:Optional
          +kubebuilder:default:=false
        type: boolean
      requestHeaders:
        allOf:
        - $ref: '#/definitions/v1beta1.IstioHeaderOperations'
        description: |-
          header manipulation rules for incoming HTTP requests
           - sets the `spec.http[].headers.request` of the Istio VirtualService
             https://istio.io/latest/docs/reference/config/networking/virtual-service/#Headers-HeaderOperations
           - the following string templates are available:
              - `.PathPrefix`: the path prefix of the Workspace (e.g. '/workspace/connect/{profile_name}/{workspace_name}/')
          +kubebuilder:validation:Optional
    type: object
  v1beta1.ImageConfig:
    properties:
      spawner:
        allOf:
        - $ref: '#/definitions/v1beta1.OptionsSpawnerConfig'
        description: spawner ui configs
      values:
        description: |-
          the list of image configs that are available
          +kubebuilder:validation:MinItems:=1
          +listType:="map"
          +listMapKey:="id"
        items:
          $ref: '#/definitions/v1beta1.ImageConfigValue'
        type: array
    type: object
  v1beta1.ImageConfigSpec:
    properties:
      image:
        description: |-
          the container image to use
          +kubebuilder:validation:MinLength:=2
          +kubeflow:example="ghcr.io/kubeflow/kubeflow/notebook-servers/jupyter-scipy:v1.7.0"
        type: string
      imagePullPolicy:
        allOf:
        - $ref: '#/definitions/v1.PullPolicy'
        description: |-
          the pull policy for the container image
          +kubebuilder:validation:Optional
          +kubebuilder:default:="IfNotPresent"
          +kubebuilder:validation:Enum:={"Always","IfNotPresent","Never"}
      ports:
        description: |-
          ports that the container listens on
            - if multiple ports are defined, the user will see multiple "Connect" buttons
              in a dropdown menu on the Workspace overview page
          +kubebuilder:validation:MinItems:=1
          +listType:="map"
          +listMapKey:="id"
        items:
          $ref: '#/definitions/v1beta1.ImagePort'
        type: array
    type: object
  v1beta1.ImageConfigValue:
    properties:
      id:
        description: |-
          the id of this image config
          +kubebuilder:validation:MinLength:=1
          +kubebuilder:validation:MaxLength:=256
          +kubebuilder:example:="jupyterlab_scipy_190"
        type: string
      redirect:
        allOf:
        - $ref: '#/definitions/v1beta1.OptionRedirect'
        description: |-
          redirect configs
          +kubebuilder:validation:Optional
      spawner:
        allOf:
        - $ref: '#/definitions/v1beta1.OptionSpawnerInfo'
        description: information for the spawner ui
      spec:
        allOf:
        - $ref: '#/definitions/v1beta1.ImageConfigSpec'
        description: the spec of the image config
    type: object
  v1beta1.ImagePort:
    properties:
      displayName:
        description: |-
          the display name of the port
          +kubebuilder:validation:MinLength:=2
          +kubebuilder:validation:MaxLength:=64
          +kubebuilder:validation:Optional
        type: string
      id:
        description: |-
          the id of the port
           - this is NOT used as the Container or Service port name, but as part of the HTTP path
          +kubebuilder:example="jupyterlab"
        type: string
      port:
        description: |-
          the port number
          +kubebuilder:validation:Minimum:=1
          +kubebuilder:validation:Maximum:=65535
          +kubebuilder:example:=8888
        type: integer
    type: object
  v1beta1.ImagePortProtocol:
    enum:
    - HTTP
    type: string
    x-enum-varnames:
    - ImagePortProtocolHTTP
  v1beta1.IstioHeaderOperations:
    properties:
      add:
        additionalProperties:
          type: string
        description: |-
          append the given values to the headers specified by keys (will create a comma-separated list of values)
          +kubebuilder:validation:Optional
          +kubebuilder:example:={ "My-Header": "value-to-append" }
        type: object
      remove:
        description: |-
          remove the specified headers
          +kubebuilder:validation:Optional
          +kubebuilder:example:={"Header-To-Remove"}
        items:
          type: string
        type: array
      set:
        additionalProperties:
          type: string
        description: |-
          overwrite the headers specified by key with the given values
          +kubebuilder:validation:Optional
          +kubebuilder:example:={ "X-RStudio-Root-Path": "{{ .PathPrefix }}" }
        type: object
    type: object
  v1beta1.OptionRedirect:
    properties:
      message:
        allOf:
        - $ref: '#/definitions/v1beta1.RedirectMessage'
        description: |-
          information about the redirect
          +kubebuilder:validation:Optional
      to:
        description: |-
          the id of the option to redirect to
          +kubebuilder:validation:MinLength:=1
          +kubebuilder:validation:MaxLength:=256
          +kubebuilder:example:="jupyterlab_scipy_190"
        type: string
    type: object
  v1beta1.OptionSpawnerInfo:
    properties:
      description:
        description: |-
          a description of the option
          +kubebuilder:validation:Optional
          +kubebuilder:validation:MinLength:=2
          +kubebuilder:validation:MaxLength:=1024
        type: string
      displayName:
        description: |-
          the display name of the option
          +kubebuilder:validation:MinLength:=2
          +kubebuilder:validation:MaxLength:=128
        type: string
      hidden:
        description: |-
          if this option should be hidden from the Workspace Spawner UI
          +kubebuilder:validation:Optional
          +kubebuilder:default:=false
        type: boolean
      labels:
        description: |-
          labels for the option
          +kubebuilder:validation:Optional
          +kubebuilder:validation:MaxItems:=32
          +listType:="map"
          +listMapKey:="key"
        items:
          $ref: '#/definitions/v1beta1.OptionSpawnerLabel'
        type: array
    type: object
  v1beta1.OptionSpawnerLabel:
    properties:
      key:
        description: |-
          the key of the label
          +kubebuilder:validation:MinLength:=2
          +kubebuilder:validation:MaxLength:=64
        type: string
      value:
        description: |-
          the value of the label
          +kubebuilder:validation:MinLength:=1
          +kubebuilder:validation:MaxLength:=64
        type: string
    type: object
  v1beta1.OptionsSpawnerConfig:
    properties:
      default:
        description: |-
          the id of the default option
           - this will be selected by default in the spawner ui
          +kubebuilder:validation:MinLength:=1
          +kubebuilder:validation:MaxLength:=256
          +kubebuilder:example="jupyterlab_scipy_190"
        type: string
    type: object
  v1beta1.PodConfig:
    properties:
      spawner:
        allOf:
        - $ref: '#/definitions/v1beta1.OptionsSpawnerConfig'
        description: spawner ui configs
      values:
        description: |-
          the list of pod configs that are available
          +kubebuilder:validation:MinItems:=1
          +listType:="map"
          +listMapKey:="id"
        items:
          $ref: '#/definitions/v1beta1.PodConfigValue'
        type: array
    type: object
  v1beta1.PodConfigSpec:
    properties:
      affinity:
        allOf:
        - $ref: '#/definitions/v1.Affinity'
        description: |-
          affinity configs for the pod
          +kubebuilder:validation:Optional
      nodeSelector:
        additionalProperties:
          type: string
        description: |-
          node selector configs for the pod
          +kubebuilder:validation:Optional
        type: object
      resources:
        allOf:
        - $ref: '#/definitions/v1.ResourceRequirements'
        description: |-
          resource configs for the "main" container in the pod
          +kubebuilder:validation:Optional
      tolerations:
        description: |-
          toleration configs for the pod
          +kubebuilder:validation:Optional
        items:
          $ref: '#/definitions/v1.Toleration'
        type: array
    type: object
  v1beta1.PodConfigValue:
    properties:
      id:
        description: |-
          the id of this pod config
          +kubebuilder:validation:MinLength:=1
          +kubebuilder:validation:MaxLength:=256
          +kubebuilder:example="big_gpu"
        type: string
      redirect:
        allOf:
        - $ref: '#/definitions/v1beta1.OptionRedirect'
        description: |-
          redirect configs
          +kubebuilder:validation:Optional
      spawner:
        allOf:
        - $ref: '#/definitions/v1beta1.OptionSpawnerInfo'
        description: information for the spawner ui
      spec:
        allOf:
        - $ref: '#/definitions/v1beta1.PodConfigSpec'
        description: the spec of the pod config
    type: object
  v1beta1.RedirectMessage:
    properties:
      level:
        allOf:
        - $ref: '#/definitions/v1beta1.RedirectMessageLevel'
        description: |-
          the importance level of the message
          +kubebuilder:example:="Info"
      text:
        description: |-
          the text of the message to show
          +kubebuilder:validation:MinLength:=2
          +kubebuilder:validation:MaxLength:=1024
          +kubebuilder:example:="This update will increase the version of JupyterLab to v1.7.1"
        type: string
    type: object
  v1beta1.RedirectMessageLevel:
    enum:
    - Info
    - Warning
    - Danger
    type: string
    x-enum-varnames:
    - RedirectMessageLevelInfo
    - RedirectMessageLevelWarning
    - RedirectMessageLevelDanger
  v1beta1.WorkspaceKindAsset:
    properties:
      configMap:
        allOf:
        - $ref: '#/definitions/v1beta1.WorkspaceKindAssetConfigMap'
        description: |-
          the ConfigMap reference for the asset
          +kubebuilder:validation:Optional
      url:
        description: |-
          the URL of the asset
          +kubebuilder:validation:Optional
          +kubebuilder:example="https://jupyter.org/assets/favicons/apple-touch-icon-152x152.png"
        type: string
    type: object
  v1beta1.WorkspaceKindAssetConfigMap:
    properties:
      key:
        description: |-
          the key in the ConfigMap which contains the data
          +kubebuilder:example="jupyterlab-logo.svg"
          +kubebuilder:validation:MinLength:=1
          +kubebuilder:validation:MaxLength:=253
          +kubebuilder:validation:Pattern:=^[-._a-zA-Z0-9]+$
        type: string
      mediaType:
        allOf:
        - $ref: '#/definitions/v1beta1.WorkspaceKindAssetMediaType'
        description: |-
          the media type of the asset data in the ConfigMap
          +kubebuilder:example="image/svg+xml"
      name:
        description: |-
          the name of the ConfigMap
          +kubebuilder:example="my-logos"
          +kubebuilder:validation:MinLength:=1
          +kubebuilder:validation:MaxLength:=253
          +kubebuilder:validation:Pattern:=^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
        type: string
      namespace:
        description: |-
          the namespace of the ConfigMap
          +kubebuilder:validation:MinLength:=1
          +kubebuilder:validation:MaxLength:=63
          +kubebuilder:validation:Pattern:=^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
          +kubebuilder:example="kubeflow"
        type: string
    type: object
  v1beta1.WorkspaceKindAssetMediaType:
    enum:
    - image/svg+xml
    type: string
    x-enum-varnames:
    - WorkspaceKindAssetMediaTypeSVG
  v1beta1.WorkspaceKindCullingConfig:
    properties:
      activityProbe:
        allOf:
        - $ref: '#/definitions/v1beta1.ActivityProbe'
        description: the probe used to determine if the Workspace is active
      enabled:
        description: |-
          if the culling feature is enabled
          +kubebuilder:validation:Optional
          +kubebuilder:default=true
        type: boolean
      maxInactiveSeconds:
        description: |-
          the maximum number of seconds a Workspace can be inactive
          +kubebuilder:validation:Optional
          +kubebuilder:validation:Minimum:=60
          +kubebuilder:default=86400
        type: integer
    type: object
  v1beta1.WorkspaceKindPodMetadata:
    properties:
      annotations:
        additionalProperties:
          type: string
        description: |-
          annotations to be applied to the Pod resource
          +kubebuilder:validation:Optional
        type: object
      labels:
        additionalProperties:
          type: string
        description: |-
          labels to be applied to the Pod resource
          +kubebuilder:validation:Optional
        type: object
    type: object
  v1beta1.WorkspaceKindPodOptions:
    properties:
      imageConfig:
        allOf:
        - $ref: '#/definitions/v1beta1.ImageConfig'
        description: imageConfig options
      podConfig:
        allOf:
        - $ref: '#/definitions/v1beta1.PodConfig'
        description: podConfig options
    type: object
  v1beta1.WorkspaceKindPodTemplate:
    properties:
      containerSecurityContext:
        allOf:
        - $ref: '#/definitions/v1.SecurityContext'
        description: |-
          container security context for Workspace Pods (MUTABLE)
          +kubebuilder:validation:Optional
      culling:
        allOf:
        - $ref: '#/definitions/v1beta1.WorkspaceKindCullingConfig'
        description: |-
          culling configs for pausing inactive Workspaces (MUTABLE)
          +kubebuilder:validation:Optional
      extraEnv:
        description: |-
          environment variables for Workspace Pods (MUTABLE)
           - the following go template functions are available:
              - `httpPathPrefix(portId string)`: returns the HTTP path prefix of the specified port
          +kubebuilder:validation:Optional
          +listType:="map"
          +listMapKey:="name"
        items:
          $ref: '#/definitions/v1.EnvVar'
        type: array
      extraVolumeMounts:
        description: |-
          extra volume mounts for Workspace Pods (MUTABLE)
          +kubebuilder:validation:Optional
          +listType:="map"
          +listMapKey:="mountPath"
        items:
          $ref: '#/definitions/v1.VolumeMount'
        type: array
      extraVolumes:
        description: |-
          extra volumes for Workspace Pods (MUTABLE)
          +kubebuilder:validation:Optional
          +listType:="map"
          +listMapKey:="name"
        items:
          $ref: '#/definitions/v1.Volume'
        type: array
      options:
        allOf:
        - $ref: '#/definitions/v1beta1.WorkspaceKindPodOptions'
        description: options are the user-selectable fields, they determine the PodSpec
          of the Workspace
      podMetadata:
        allOf:
        - $ref: '#/definitions/v1beta1.WorkspaceKindPodMetadata'
        description: |-
          metadata for Workspace Pods (MUTABLE)
          +kubebuilder:validation:Optional
      ports:
        description: |-
          port definitions which can be referenced in image config values
          - think of port definitions as the "types" of services which could be provided by a specific image
          - a port definition has a common id (URL path) for consistency if the listening TCP port changes
          - ports are referenced in image config values by their `id` and their definition here establishes
            their protocol type, and default display name in the UI
          +kubebuilder:validation:MinItems:=1
          +listType:="map"
          +listMapKey:="id"
        items:
          $ref: '#/definitions/v1beta1.WorkspaceKindPort'
        type: array
      probes:
        allOf:
        - $ref: '#/definitions/v1beta1.WorkspaceKindProbes'
        description: |-
          standard probes to determine Container health (MUTABLE)
          +kubebuilder:validation:Optional
      securityContext:
        allOf:
        - $ref: '#/definitions/v1.PodSecurityContext'
        description: |-
          security context for Workspace Pods (MUTABLE)
          +kubebuilder:validation:Optional
      serviceAccount:
        allOf:
        - $ref: '#/definitions/v1beta1.WorkspaceKindServiceAccount'
        description: service account configs for Workspace Pods
      volumeMounts:
        allOf:
        - $ref: '#/definitions/v1beta1.WorkspaceKindVolumeMounts'
        description: volume mount paths
    type: object
  v1beta1.WorkspaceKindPort:
    properties:
      defaultDisplayName:
        description: |-
          the default display name of the port
          - note, this can be overridden on a per image config value basis
          +kubebuilder:validation:MinLength:=2
          +kubebuilder:validation:MaxLength:=64
          +kubebuilder:example:="JupyterLab"
        type: string
      httpProxy:
        allOf:
        - $ref: '#/definitions/v1beta1.HTTPProxy'
        description: |-
          the http proxy config for the port (MUTABLE)
          +kubebuilder:validation:Optional
      id:
        description: |-
          the id of the port
          - identifier for the port in `imageconfig` ports.[].id
          +kubebuilder:example="jupyterlab"
        type: string
      protocol:
        allOf:
        - $ref: '#/definitions/v1beta1.ImagePortProtocol'
        description: |-
          the protocol of the port
          +kubebuilder:example:="HTTP"
    type: object
  v1beta1.WorkspaceKindProbes:
    properties:
      livenessProbe:
        allOf:
        - $ref: '#/definitions/v1.Probe'
        description: |-
          the liveness probe for the main container
          +kubebuilder:validation:Optional
      readinessProbe:
        allOf:
        - $ref: '#/definitions/v1.Probe'
        description: |-
          the readiness probe for the main container
          +kubebuilder:validation:Optional
      startupProbe:
        allOf:
        - $ref: '#/definitions/v1.Probe'
        description: |-
          the startup probe for the main container
          +kubebuilder:validation:Optional
    type: object
  v1beta1.WorkspaceKindServiceAccount:
    properties:
      name:
        description: |-
          the name of the ServiceAccount (NOT MUTABLE)
           - this Service Account MUST already exist in the Namespace
             of the Workspace, the controller will NOT create it
           - we will not show this WorkspaceKind in the Spawner UI
             if the SA does not exist in the Namespace
          +kubebuilder:validation:XValidation:rule="self == oldSelf",message="ServiceAccount 'name' is immutable"
          +kubebuilder:example="default-editor"
          +kubebuilder:validation:MinLength:=1
          +kubebuilder:validation:MaxLength:=253
          +kubebuilder:validation:Pattern:=^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
        type: string
    type: object
  v1beta1.WorkspaceKindSpawner:
    properties:
      deprecated:
        description: |-
          if this WorkspaceKind is deprecated
          +kubebuilder:validation:Optional
          +kubebuilder:default:=false
        type: boolean
      deprecationMessage:
        description: |-
          a message to show in Workspace Spawner UI when the WorkspaceKind is deprecated
          +kubebuilder:validation:Optional
          +kubebuilder:validation:MinLength:=2
          +kubebuilder:validation:MaxLength:=256
          +kubebuilder:example:="This WorkspaceKind will be removed on 20XX-XX-XX, please use another WorkspaceKind."
        type: string
      description:
        description: |-
          the description of the WorkspaceKind
          +kubebuilder:validation:MinLength:=2
          +kubebuilder:validation:MaxLength:=4096
          +kubebuilder:example:="A Workspace which runs JupyterLab in a Pod"
        type: string
      displayName:
        description: |-
          the display name of the WorkspaceKind
          +kubebuilder:validation:MinLength:=2
          +kubebuilder:validation:MaxLength:=128
          +kubebuilder:example:="JupyterLab Notebook"
        type: string
      hidden:
        description: |-
          if this WorkspaceKind should be hidden from the Workspace Spawner UI
          +kubebuilder:validation:Optional
          +kubebuilder:default:=false
        type: boolean
      icon:
        allOf:
        - $ref: '#/definitions/v1beta1.WorkspaceKindAsset'
        description: |-
          the icon of the WorkspaceKind
           - a small (favicon-sized) icon used in the Workspace Spawner UI
      logo:
        allOf:
        - $ref: '#/definitions/v1beta1.WorkspaceKindAsset'
        description: |-
          the logo of the WorkspaceKind
           - a 1:1 (card size) logo used in the Workspace Spawner UI
    type: object
  v1beta1.WorkspaceKindVolumeMounts:
    properties:
      home:
        description: |-
          the path to mount the home PVC (NOT MUTABLE)
          +kubebuilder:validation:MinLength:=2
          +kubebuilder:validation:MaxLength:=4096
          +kubebuilder:validation:Pattern:=^/[^/].*$
          +kubebuilder:validation:XValidation:rule="self == oldSelf",message="mount path of 'home' is immutable"
          +kubebuilder:example:="/home/jovyan"
        type: string
    type: object
  v1beta1.WorkspaceState:
    enum:
    - Running
    - Terminating
    - Paused
    - Pending
    - Error
    - Unknown
    type: string
    x-enum-varnames:
    - WorkspaceStateRunning
    - WorkspaceStateTerminating
    - WorkspaceStatePaused
    - WorkspaceStatePending
    - WorkspaceStateError
    - WorkspaceStateUnknown
host: localhost:4000
info:
  contact: {}
  description: |-
    This API provides endpoints to manage notebooks in a Kubernetes cluster.
    For more information, visit https://www.kubeflow.org/docs/components/notebooks/
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Kubeflow Notebooks API
  version: 1.0.0
paths:
  /healthcheck:
    get:
      description: Provides a healthcheck response indicating the status of key services.
      operationId: getHealthcheck
      produces:
      - application/json
      responses:
        "200":
          description: Successful healthcheck response
          schema:
            $ref: '#/definitions/github_com_kubeflow_notebooks_workspaces_backend_internal_models_health_check.HealthCheck'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/api.ErrorEnvelope'
      summary: Returns the health status of the application
      tags:
      - healthcheck
  /namespaces:
    get:
      description: Returns a list of all namespaces in the cluster.
      operationId: listNamespaces
      produces:
      - application/json
      responses:
        "200":
          description: Successful namespaces response
          schema:
            $ref: '#/definitions/api.NamespaceListEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.ErrorEnvelope'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/api.ErrorEnvelope'
      summary: List namespaces
      tags:

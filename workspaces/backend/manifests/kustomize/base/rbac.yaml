apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workspaces-backend
rules:
- apiGroups:
  - kubeflow.org
  resources:
  - workspaces
  - workspacekinds
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - namespaces
  # configmaps: required for workspace kind assets (icons/logos) stored in ConfigMaps
  # the backend uses a filtered cache for ConfigMaps with label: notebooks.kubeflow.org/image-source=true
  - configmaps
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: workspaces-backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: workspaces-backend
subjects:
- kind: ServiceAccount
  name: workspaces-backend
  namespace: kubeflow-workspaces
apiVersion: kubeflow.org/v1beta1
kind: WorkspaceKind
metadata:
  name: rstudio
spec:
  spawner:
    displayName: "RStudio"
    description: "A workspace which runs RStudio in a pod"
    hidden: false
    deprecated: false
    deprecationMessage: ""
    icon:
      url: "https://comptoir-du-libre.org/img/files/Softwares/RStudio/avatar/RStudio_Logo.png"
    logo:
      url: "https://rtask.thinkr.fr/wp-content/uploads/RStudio_Logo.png"

  podTemplate:
    podMetadata:
      labels: {}
      annotations: {}
    serviceAccount:
      name: "default-editor"
    culling:
      enabled: true
      maxInactiveSeconds: 86400
      activityProbe:
        exec:
          command:
            - "bash"
            - "-c"
            - "exit 0"
    volumeMounts:
      home: "/home/rstudio"
    ports:
      - id: "rstudio"
        defaultDisplayName: "RStudio"
        protocol: "HTTP"
        httpProxy:
          removePathPrefix: false
          requestHeaders:
            set:
              "X-RStudio-Root-Path": "{{ .PathPrefix }}"
    extraEnv: []
    extraVolumeMounts:
      - name: "dshm"
        mountPath: "/dev/shm"
    extraVolumes:
      - name: "dshm"
        emptyDir:
          medium: "Memory"
    securityContext:
      fsGroup: 100
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
    options:
      imageConfig:
        spawner:
          default: "rstudio_1100"
        values:
          - id: "rstudio_1100"
            spawner:
              displayName: "rstudio:v1.10.0"
              description: "RStudio base image"
              labels:
                - key: "rstudio_version"
                  value: "v1.10.0"
            spec:
              image: "ghcr.io/kubeflow/kubeflow/notebook-servers/rstudio:v1.10.0"
              imagePullPolicy: "IfNotPresent"
              ports:
                - id: "rstudio"
                  port: 8888
      podConfig:
        spawner:
          default: "small_cpu"
        values:
          - id: "tiny_cpu"
            spawner:
              displayName: "Tiny CPU"
              description: "Pod with 0.1 CPU, 128 Mb RAM"
              labels:
                - key: "cpu"
                  value: "100m"
                - key: "memory"
                  value: "128Mi"
            spec:
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
          - id: "small_cpu"
            spawner:
              displayName: "Small CPU"
              description: "Pod with 1 CPU, 2 GB RAM"
              labels:
                - key: "cpu"
                  value: "1000m"
                - key: "memory"
                  value: "2Gi"
            spec:
              resources:
                requests:
                  cpu: 1000m
                  memory: 2Gi
          - id: "big_gpu"
            spawner:
              displayName: "Big GPU"
              description: "Pod with 4 CPU, 16 GB RAM, and 1 GPU"
              labels:
                - key: "cpu"
                  value: "4000m"
                - key: "memory"
                  value: "16Gi"
                - key: "gpu"
                  value: "1"
            spec:
              resources:
                requests:
                  cpu: 4000m
                  memory: 16Gi
                limits:
                  nvidia.com/gpu: 1
              tolerations:
                - key: "nvidia.com/gpu"
                  operator: "Exists"
                  effect: "NoSchedule"

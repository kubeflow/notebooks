apiVersion: kubeflow.org/v1beta1
kind: WorkspaceKind
metadata:
  name: rstudio
spec:
  spawner:
    displayName: "RStudio"
    description: "A workspace which runs RStudio in a pod"
    hidden: false
    deprecated: false
    deprecationMessage: "This WorkspaceKind will be removed on 20XX-XX-XX, please use another WorkspaceKind."
    icon:
      url: "https://www.rstudio.com/wp-content/uploads/2018/10/RStudio-Logo-Flat.png"
    logo:
      url: "https://www.rstudio.com/wp-content/uploads/2018/10/RStudio-Logo-Flat.png"

  podTemplate:
    podMetadata:
      labels: {}
      annotations: {}
    serviceAccount:
      name: "default-editor"
    culling:
      enabled: true
      maxInactiveSeconds: 86400
      activityProbe:
        exec:
          command:
            - "bash"
            - "-c"
            - "exit 0"
    volumeMounts:
      home: "/home/rstudio"
    ports:
      - id: "rstudio"
        defaultDisplayName: "RStudio"
        protocol: "HTTP"
        httpProxy:
          removePathPrefix: false
          requestHeaders:
            set: { "X-RStudio-Root-Path": "{{ .PathPrefix }}" }
    extraEnv: []
    extraVolumeMounts:
      - name: "dshm"
        mountPath: "/dev/shm"
    extraVolumes:
      - name: "dshm"
        emptyDir:
          medium: "Memory"
    securityContext:
      fsGroup: 100
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
    options:
      imageConfig:
        spawner:
          default: "rstudio_190"
        values:
          - id: "rstudio_190"
            spawner:
              displayName: "rstudio:v1.9.0"
              description: "RStudio base image (R, Conda, Python)"
              labels:
                - key: "r_version"
                  value: "4.x"
            spec:
              image: "ghcr.io/kubeflow/kubeflow/notebook-servers/rstudio:v1.9.0"
              imagePullPolicy: "IfNotPresent"
              ports:
                - id: "rstudio"
                  port: 8888
      podConfig:
        spawner:
          default: "small_cpu"
        values:
          - id: "small_cpu"
            spawner:
              displayName: "Small CPU"
              description: "1 CPU, 2 GB RAM"
              labels:
                - key: "cpu"
                  value: "1000m"
                - key: "memory"
                  value: "2Gi"
            spec:
              resources:
                requests:
                  cpu: 1000m
                  memory: 2Gi

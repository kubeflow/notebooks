apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
- pairs:
    app.kubernetes.io/component: webhook

resources:
- manifests.yaml
- service.yaml

configurations:
- kustomizeconfig.yaml

# Rename the generated ValidatingWebhookConfiguration to be unique
# (controller-gen hardcodes the name as "validating-webhook-configuration")
patches:
- target:
    kind: ValidatingWebhookConfiguration
    name: validating-webhook-configuration
  patch: |-
    - op: replace
      path: /metadata/name
      value: workspaces-validating-webhook-configuration

replacements:
- source:
    kind: ValidatingWebhookConfiguration
    fieldPath: .metadata.name
  targets:
  - select:
      kind: ValidatingWebhookConfiguration
    fieldPaths:
    - .metadata.labels.[app.kubernetes.io/instance]
    options:
      create: true
- source:
    kind: Service
    version: v1
    name: workspaces-webhook-service
    fieldPath: .metadata.name
  targets:
  - select:
      kind: ValidatingWebhookConfiguration
    fieldPaths:
    - .webhooks.*.clientConfig.service.name
    options:
      create: false

name: E2E Tests

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - notebooks-v2
      - v*-branch
  pull_request:
    paths:
      - 'workspaces/**'
      - 'testing/**'

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    env:
      TERM: xterm-256color
    defaults:
      run:
        working-directory: testing
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./testing/e2e/package.json
          cache: npm
          cache-dependency-path: ./testing/e2e/package-lock.json

      - name: Set up Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: ./testing/kind-1-35.yaml
          cluster_name: "local-e2e"

      - name: Install cluster dependencies
        run: make setup-deps

      - name: Deploy components
        run: make deploy-all

      - name: Verify cluster readiness
        run: make cluster-readiness

      - name: Run e2e tests
        run: make local-e2e

      - name: Upload test artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: e2e-test-results
          path: |
            testing/e2e/cypress/videos/
            testing/e2e/cypress/screenshots/
          retention-days: 7

name: VWA Frontend Tests
on:
  pull_request:
    paths:
      - components/crud-web-apps/volumes/frontend/**
      - components/crud-web-apps/common/frontend/**
      - releasing/version/VERSION
    branches:
      - main
      - notebooks-v1
      - 'v*-branch'

env:
  NODE_VERSION: 24.11.1

jobs:
  frontend-format-linting-check:
    name: Check code format and lint
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: components/crud-web-apps/volumes/frontend
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci
      - name: Check frontend formatting
        run: npm run format:check
      - name: Check frontend code linting
        run: npm run lint-check

  frontend-unit-tests:
    runs-on: ubuntu-22.04
    name: Unit tests
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Kubeflow common library dependecies
        run: |
          cd components/crud-web-apps/common/frontend/kubeflow-common-lib
          npm ci
          npm run build
          npm link ./dist/kubeflow
      - name: Install VWA dependencies
        run: |
          cd components/crud-web-apps/volumes/frontend
          npm ci
          npm link kubeflow
      - name: Run unit tests
        run: |
          cd components/crud-web-apps/volumes/frontend
          npm run test:prod
  run-tests-in-chrome:
    name: UI tests in chrome
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Kubeflow common library dependecies
        run: |
          cd components/crud-web-apps/common/frontend/kubeflow-common-lib
          npm ci
          npm run build
          npm link ./dist/kubeflow
      - name: Install VWA dependencies
        run: |
          cd components/crud-web-apps/volumes/frontend
          npm ci
          npm link kubeflow
      - name: Serve UI & run Cypress tests in Chrome
        uses: cypress-io/github-action@f790eee7a50d9505912f50c2095510be7de06aa7 # v6.10.9
        with:
          working-directory: components/crud-web-apps/volumes/frontend
          start: npm run serve
          install: false
          browser: chrome
          wait-on: "http://localhost:4200"

  run-tests-in-firefox:
    name: UI tests in firefox
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Kubeflow common library dependecies
        run: |
          cd components/crud-web-apps/common/frontend/kubeflow-common-lib
          npm ci
          npm run build
          npm link ./dist/kubeflow

      - name: Install VWA dependencies
        run: |
          cd components/crud-web-apps/volumes/frontend
          npm ci
          npm link kubeflow

      - name: Serve UI & run Cypress tests in Firefox
        uses: cypress-io/github-action@a55856e0e961f64708c68ddcb38fba233d164ed8 # v6
        with:
          working-directory: components/crud-web-apps/volumes/frontend
          start: npm run serve
          install: false
          browser: firefox
          wait-on: "http://localhost:4200"
